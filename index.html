        // --- WEB AUDIO API (SOUND EFFECTS) ---
        let audioCtx = null;
        const playSfx = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return; 

                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                if (type === 'correct') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(600, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1); 
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'incorrect') {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(200, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2); 
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                } else if (type === 'click') {
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.05); 
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.05);
                }
            } catch (err) {
                console.warn("Efek suara tidak didukung.", err);
            }
        };

        function Level2Pola({ onComplete, onCorrect }) {
            const data = LEVEL_DATA[2];
            const [answers, setAnswers] = useState({});
            const [step, setStep] = useState('quiz'); 
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [scoreDetails, setScoreDetails] = useState(0);

            const flatQuestions = React.useMemo(() => {
                const arr = [];
                data.parts.forEach(part => {
                    part.questions.forEach(q => {
                        const originalOptions = [...q.options];
                        const shuffledOptions = shuffleArray(originalOptions);
                        
                        let newCorrect;
                        if (q.type === 'single') {
                            newCorrect = shuffledOptions.indexOf(originalOptions[q.correct]);
                        } else {
                            newCorrect = q.correct.map(idx => shuffledOptions.indexOf(originalOptions[idx]));
                        }

                        arr.push({
                            ...q,
                            options: shuffledOptions,
                            correct: newCorrect,
                            stimulusTitle: part.stimulusTitle,
                            stimulusText: part.stimulusText,
                        });
                    });
                });
                return arr;
            }, [data]);

            const currentQ = flatQuestions[currentQIndex];

            const handleSingle = (qId, optIdx) => { setAnswers(prev => ({ ...prev, [qId]: optIdx })); };
            const handleMultiple = (qId, optIdx) => {
                setAnswers(prev => {
                    const current = prev[qId] || [];
                    if (current.includes(optIdx)) return { ...prev, [qId]: current.filter(x => x !== optIdx) };
                    return { ...prev, [qId]: [...current, optIdx] }; 
                });
            };

            const isCurrentAnswered = currentQ.type === 'single' ? answers[currentQ.id] !== undefined : (answers[currentQ.id] && answers[currentQ.id].length > 1);

            const handleNext = () => { if (currentQIndex < flatQuestions.length - 1) setCurrentQIndex(prev => prev + 1); };
            const handlePrev = () => { if (currentQIndex > 0) setCurrentQIndex(prev => prev - 1); };

            const handleSubmit = () => {
                let correctAns = 0;
                flatQuestions.forEach(q => {
                    const userAns = answers[q.id];
                    if (q.type === 'single') {
                        if (userAns === q.correct) correctAns++;
                    } else if (q.type === 'multiple') {
                        if (Array.isArray(userAns) && userAns.length === q.correct.length && userAns.every(val => q.correct.includes(val))) correctAns++;
                    }
                });

                if (correctAns === flatQuestions.length) playSfx('correct');
                else playSfx('incorrect');

                setScoreDetails(correctAns);

            const [selectedWord, setSelectedWord] = useState(null);
            const [dragOverBlank, setDragOverBlank] = useState(null);
            const [feedbackMsg, setFeedbackMsg] = useState("");
            const [completed, setCompleted] = useState(false);

            useEffect(() => {
                setAvailableWords(shuffleArray(data.words));
                setDroppedWords({});
            }, [data.words]);

            const handleDragStart = (e, word, sourceBlankId = null) => {
                e.dataTransfer.setData("word", JSON.stringify(word));
                e.dataTransfer.setData("source", sourceBlankId || "pool");
            };

            const handleDropOnBlank = (e, blankId) => {
                e.preventDefault();
                setDragOverBlank(null);
                const wordData = e.dataTransfer.getData("word");
                const source = e.dataTransfer.getData("source");
                
                if (wordData) {
                    const word = JSON.parse(wordData);
                    setAvailableWords(prev => prev.filter(w => w.id !== word.id));
                    setDroppedWords(prev => {
                        const newDropped = { ...prev };
                        if (source !== "pool" && source !== blankId) delete newDropped[source];
                        if (newDropped[blankId]) setAvailableWords(avail => [...avail, newDropped[blankId]]);
                        newDropped[blankId] = word;
                        return newDropped;
                    });
                    setFeedbackMsg("");
                    setSelectedWord(null);
                }
            };

            const handleDropOnPool = (e) => {
                e.preventDefault();
                const wordData = e.dataTransfer.getData("word");
                const source = e.dataTransfer.getData("source");
                
                if (wordData && source !== "pool") {
                    const word = JSON.parse(wordData);
                    setDroppedWords(prev => {
                        const newDropped = { ...prev };
                        delete newDropped[source];
                        return newDropped;
                    });
                    setAvailableWords(prev => {
                        if (!prev.find(w => w.id === word.id)) return [...prev, word];
                        return prev;
                    });
                    setFeedbackMsg("");
                }
            };
            
            const handleWordClick = (word) => { setSelectedWord(selectedWord?.id === word.id ? null : word); };

            const handleBlankClick = (blankId) => {
                if (selectedWord) {
                    if (droppedWords[blankId]) setAvailableWords(prev => [...prev, droppedWords[blankId]]);
                    setDroppedWords(prev => ({...prev, [blankId]: selectedWord}));
                    setAvailableWords(prev => prev.filter(w => w.id !== selectedWord.id));
                    setSelectedWord(null);
                    setFeedbackMsg("");
                } else if (droppedWords[blankId]) {
                    setAvailableWords(prev => [...prev, droppedWords[blankId]]);
                    setDroppedWords(prev => {
                        const newDropped = {...prev};
                        delete newDropped[blankId];
                        return newDropped;
                    });
                    setFeedbackMsg("");
                }
            };

            const handleCheckAnswer = () => {
                let isAllCorrect = true;
                let totalBlanks = 0;
                let filledBlanks = 0;

                data.paragraphs.forEach(p => {
                    p.sentences.forEach(s => {
                        totalBlanks++;
                        const dropped = droppedWords[s.blankId];
                        if (dropped) {
                            filledBlanks++;
                            if (dropped.text !== s.correct) isAllCorrect = false;
                        } else {
                            isAllCorrect = false;
                        }
                    });
                });

                if (filledBlanks < totalBlanks) {
                    setFeedbackMsg("PERINGATAN: Ada slot data yang kosong. Harap lengkapi algoritma.");
                    return;
                }

                if (isAllCorrect) {
                    playSfx('correct');
                    for(let i=0; i<6; i++) { if (onCorrect) onCorrect(); }
                    setCompleted(true);
                } else {
                    playSfx('incorrect');
                    setFeedbackMsg("ERROR: Rangkaian logika salah. Klik kata untuk mengembalikannya ke pool.");
                }
            };

            }, [isMusicPlaying]);

            const toggleMusic = () => setIsMusicPlaying(!isMusicPlaying);

            const handleStartGame = (name, school) => {
                setPlayerName(name);
                setPlayerSchool(school);
                setCurrentView('tujuan_panduan'); 
                setIsMusicPlaying(true); 
            };

            const handleLevelComplete = (levelNum) => {
                if (levelNum < 5) {
                    setUnlockedLevel(prev => Math.max(prev, levelNum + 1));
                    setCurrentView('map');
                } else {
                    setCurrentView('end');
                }
            };

            const startLevel = (levelNum) => setCurrentView(`level${levelNum}`);
            const updateUserData = (key, value) => setUserData(prev => ({ ...prev, [key]: value }));
            const incrementCorrect = () => setCorrectCount(prev => prev + 1);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch((e) => console.log(e));
                    setIsFullscreen(true);
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                        setIsFullscreen(false);
                    }
                }
            };

            let currentIslandName = "";
            let currentMission = "";
            let currentIcon = "";
            if (currentView.startsWith('level')) {
                const lvl = parseInt(currentView.replace('level', ''));
                if (LEVEL_DATA[lvl]) {
                    currentIslandName = LEVEL_DATA[lvl].title;
                    currentMission = LEVEL_DATA[lvl].subtitle;
                    const icons = ["", "⚖️", "👁️", "💡", "🧠", "🛠️"];
                    currentIcon = icons[lvl];
                }
            }

            return (
                <div className="h-screen w-screen font-sans text-gray-100 flex flex-col transition-all duration-700 ease-in-out overflow-hidden relative" style={{ backgroundImage: 'url(https://i.imgur.com/hy9mtbr.png)', backgroundSize: 'cover', backgroundPosition: 'center', backgroundAttachment: 'fixed' }}>
                  
                  <audio ref={audioRef} src={BACKSONG_URL} loop preload="auto" />

                  <div className="flex flex-col w-full max-w-[1600px] mx-auto h-full relative z-10">
                    
                    {/* Header Top Bar */}
                    <div className="flex-none z-40 bg-slate-900/90 backdrop-blur-md border-b border-cyan-500 p-2 md:p-3 xl:p-4 text-cyan-50 flex justify-between items-center shadow-[0_4px_20px_rgba(34,211,238,0.2)] mx-2 mt-2 rounded-xl gap-2">
                        <div className="flex items-center gap-2 md:gap-3 xl:gap-4 flex-shrink-0 w-1/4">
                             <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-1.5 xl:p-2 bg-slate-800 hover:bg-cyan-900 text-cyan-400 rounded-lg border border-cyan-800 transition">
                               {isMenuOpen ? <Icons.X className="w-6 h-6 xl:w-8 xl:h-8" /> : <Icons.Menu className="w-6 h-6 xl:w-8 xl:h-8" />}
                             </button>
                             <div className="w-8 h-8 xl:w-12 xl:h-12 bg-cyan-600 rounded-lg flex items-center justify-center text-white font-black shadow-inner hidden sm:flex border border-cyan-400">
                                <Icons.Cpu className="w-5 h-5 xl:w-7 xl:h-7" />
                             </div>
                             <div className="hidden lg:flex flex-col">
                               <h1 className="font-bold text-lg xl:text-xl 2xl:text-2xl leading-none text-cyan-300 tracking-wider font-tech">Akademi CT</h1>
                             </div>
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center text-center overflow-hidden">
                            {currentIslandName ? (
                                <>
                                    <div className="flex items-center bg-indigo-900 px-4 md:px-6 py-1 xl:py-1.5 rounded-md text-xs md:text-base xl:text-xl font-bold text-cyan-100 border border-indigo-500 shadow-[0_0_10px_rgba(99,102,241,0.5)] whitespace-nowrap">
                                        <span className="mr-2 text-base md:text-xl xl:text-2xl">{currentIcon}</span> <span className="font-tech tracking-wide">{currentIslandName}</span>
                                    </div>
                                    <div className="text-[10px] md:text-xs xl:text-sm font-bold text-cyan-300 mt-1 bg-slate-800 px-3 md:px-5 py-0.5 xl:py-1 rounded-md border border-cyan-800 truncate max-w-full font-tech">
                                        {currentMission}
                                    </div>
                                </>
                            ) : (
                                <div className="flex flex-col items-center lg:hidden">
                                    <h1 className="font-bold text-base text-cyan-300 leading-none font-tech tracking-wider">Akademi CT</h1>
                                    {playerName && <div className="text-[10px] text-cyan-500 font-medium mt-1 font-tech">Kadet: {playerName}</div>}
                                </div>
                            )}
                        </div>

                        <div className="flex items-center gap-2 md:gap-3 xl:gap-5 flex-shrink-0 w-1/4 justify-end">
                            <button onClick={toggleMusic} className="p-1.5 xl:p-2 bg-slate-800 hover:bg-cyan-900 text-cyan-400 rounded-lg transition border border-cyan-800">
                               {isMusicPlaying ? <Icons.Volume2 className="w-5 h-5 md:w-6 md:h-6 xl:w-8 xl:h-8"/> : <Icons.VolumeX className="w-5 h-5 md:w-6 md:h-6 xl:w-8 xl:h-8"/>}
                            </button>
                            <div className="flex items-center gap-2 bg-slate-800 px-3 py-1.5 xl:px-5 xl:py-2 rounded-lg text-sm md:text-base xl:text-xl border border-cyan-700 shadow-inner">
                              <Icons.Star className="w-4 h-4 md:w-5 md:h-5 xl:w-6 xl:h-6 text-yellow-400 fill-yellow-400 animate-pulse" />
                              <span className="font-bold text-cyan-100 font-tech">{correctCount} <span className="text-cyan-600">/ 50</span></span>
                            </div>
                            <button onClick={toggleFullscreen} className="p-1.5 xl:p-2 bg-slate-800 hover:bg-cyan-900 text-cyan-400 rounded-lg hidden sm:block transition border border-cyan-800">
                               {isFullscreen ? <Icons.Minimize className="w-5 h-5 md:w-6 md:h-6 xl:w-8 xl:h-8"/> : <Icons.Maximize className="w-5 h-5 md:w-6 md:h-6 xl:w-8 xl:h-8"/>}
                            </button>
                        </div>
                    </div>

                    {/* Menu Overlay */}
                    {isMenuOpen && (
                      <div className="absolute top-[70px] md:top-[90px] xl:top-[100px] left-2 w-64 md:w-72 xl:w-80 bg-slate-900/95 backdrop-blur-md shadow-[0_0_30px_rgba(34,211,238,0.3)] z-50 rounded-xl xl:rounded-2xl border border-cyan-500 animate-fade-in overflow-hidden">
                          <div className="p-4 xl:p-5 space-y-3 xl:space-y-4">
                            <div className="font-bold text-cyan-500 uppercase text-xs xl:text-sm tracking-wider mb-2 border-b border-slate-700 pb-2 font-tech">Sistem Navigasi</div>
                            <button onClick={() => {setCurrentView('map'); setIsMenuOpen(false)}} className="w-full text-left p-3 rounded-lg flex items-center gap-3 xl:gap-4 hover:bg-slate-800 text-cyan-100 font-bold text-sm md:text-base xl:text-lg transition">
                               <Icons.Map className="w-5 h-5 xl:w-6 xl:h-6 text-cyan-400" /> Peta Jaringan
                            </button>
                            <button onClick={() => {setCurrentView('tujuan_panduan'); setIsMenuOpen(false)}} className="w-full text-left p-3 rounded-lg flex items-center gap-3 xl:gap-4 hover:bg-slate-800 text-cyan-100 font-bold text-sm md:text-base xl:text-lg transition">
                               <Icons.Home className="w-5 h-5 xl:w-6 xl:h-6 text-cyan-400" /> Markas Utama
                            </button>
                            <hr className="my-2 border-slate-700" />
                            <button onClick={() => window.location.reload()} className="w-full text-left p-3 rounded-lg flex items-center gap-3 xl:gap-4 text-rose-400 hover:bg-slate-800 font-bold text-sm md:text-base xl:text-lg transition">
                              <Icons.RefreshCcw className="w-5 h-5 xl:w-6 xl:h-6" /> Reboot Sistem
                            </button>
                          </div>
                      </div>
                    )}

                    {/* Content Area */}
                    <main className="flex-grow flex flex-col min-h-0 overflow-y-auto custom-scrollbar relative">
                        <div className={`flex flex-col flex-grow w-full mx-auto p-2 md:p-4 xl:p-6 ${['intro', 'tujuan_panduan', 'materi', 'map'].includes(currentView) ? 'justify-center items-center' : ''}`}>
                            {currentView === 'intro' && <IntroScreen onStart={handleStartGame} />}
                            {currentView === 'tujuan_panduan' && <TujuanPanduanScreen onNext={() => setCurrentView('materi')} />}
                            {currentView === 'materi' && <MateriScreen onNext={() => setCurrentView('map')} onCorrect={incrementCorrect} />}
                            {currentView === 'map' && <MapScreen unlockedLevel={unlockedLevel} onLevelSelect={startLevel} onFinish={() => setCurrentView('end')} isCompleted={unlockedLevel > 5} />}
                            {currentView === 'level1' && <Level1Dekomposisi onComplete={() => handleLevelComplete(1)} onCorrect={incrementCorrect} />}
                            {currentView === 'level2' && <Level2Pola onComplete={() => handleLevelComplete(2)} onCorrect={incrementCorrect} />}
                            {currentView === 'level3' && <Level3Abstraksi onComplete={() => handleLevelComplete(3)} onCorrect={incrementCorrect} />}
                            {currentView === 'level4' && <Level4Algoritma onComplete={() => handleLevelComplete(4)} onCorrect={incrementCorrect} />}
                            {currentView === 'level5' && <Level5Proyek onComplete={() => handleLevelComplete(5)} saveRef={(val) => updateUserData('ref5', val)} saveData={updateUserData} />}
                            {currentView === 'end' && <EndScreen userData={userData} correctCount={correctCount} playerName={playerName} playerSchool={playerSchool} onRestart={() => window.location.reload()} />}
                        </div>
                    </main>

                  </div>
                </div>
            );
        }

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center h-full w-full bg-slate-900 text-rose-400 p-8 font-tech text-center">
                            <h1 className="text-3xl font-bold mb-4">CRITICAL SYSTEM ERROR</h1>
                            <p className="mb-4">Terjadi kesalahan pada modul UI:</p>
                            <pre className="bg-slate-950 p-4 rounded text-left overflow-auto max-w-4xl text-sm border border-rose-800">
                                {this.state.error.toString()}
                            </pre>
                            <button onClick={() => window.location.reload()} className="mt-6 bg-rose-600 text-white px-6 py-2 rounded font-bold hover:bg-rose-500">REBOOT SYSTEM</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(
                <ErrorBoundary>
                    <PetualanganBhinneka />
                </ErrorBoundary>
            );
        } catch (err) {
            document.getElementById('root').innerHTML = `
                <div style="padding: 2rem; color: #f87171; background-color: #0f172a; height: 100vh; font-family: monospace;">
                    <h2>Babel Compile Error:</h2>
                    <pre>${err.message}</pre>
                </div>
            `;
            console.error(err);
        }
    </script>
</body>
</html>
